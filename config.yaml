# =============================================================================
# Evo-MedAgent Configuration (v2 — VLM反思 + 人机协同 + 持久化数据库)
# =============================================================================

# ========== LLM Backend (推理) ==========
# DeepSeek-V4-Pro: 文本推理，走 API
llm:
  provider: "deepseek"
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  max_tokens: 2048
  temperature: 0.0

  # ===== VLM (视觉多模态反思) =====
  # 阿里云百炼 qwen-vl-max — 云端视觉推理，不占本地显存
  vlm:
    provider: "openai"
    api_key_env: "DASHSCOPE_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-vl-max"
    max_tokens: 600
    temperature: 0.0

# ========== Embedding Model ==========
embedding:
  model: "all-MiniLM-L6-v2"       # sentence-transformers 模型
  device: "cpu"                   # cpu | cuda
  dimension: 384

# ========== 数据库 (持久化存储) ==========
# ★ 改进：从纯内存/JSON 演进到向量数据库 + 图数据库
database:

  # ---- Qdrant: 向量检索 ----
  # 用于情景记忆 (E) 的语义相似度检索
  # 存储：case_descriptor 的向量 + 病例元数据
  qdrant:
    enabled: false                 # 设为 true 启用；false 退回到内存 Embedder
    url: "http://localhost:6333"
    api_key_env: "QDRANT_API_KEY"  # Qdrant Cloud 需要，本地可留空
    collection_name: "evo_medagent_episodic"
    vector_dim: 384                # 与 embedding.dimension 一致

  # ---- Neo4j: 知识图谱 ----
  # 用于程序化记忆 (S) 的规则关系管理
  # 存储：诊断规则节点 + 优先级/冲突/演进边
  neo4j:
    enabled: false                 # 设为 true 启用；false 退回到内存字典
    uri: "bolt://localhost:7687"
    username: "neo4j"
    password_env: "NEO4J_PASSWORD"
    database: "neo4j"

# ========== Episodic Memory (E) ==========
episodic:
  max_episodes: 200
  retrieval_k: 3
  relevance_threshold: 0.3

# ========== Procedural Memory (S) ==========
procedural:
  max_rules: 50
  retrieval_k: 5
  exploration_weight: 0.15
  prune_threshold: 0.0
  priority_default: 1

# ========== Tool Governance (G) ==========
governance:
  trusted_threshold: 0.70
  trusted_min_interactions: 6
  avoid_threshold: 0.60
  avoid_min_interactions: 10

# ========== Reflection (反思) ==========
reflection:
  enabled: true
  summarize_episode: true
  extract_rules: true

  # ★ 关键安全机制：人机协同 (Human-in-the-Loop)
  #   防止早期幻觉规则"污染"程序化记忆
  human_in_the_loop: true          # 启用人工审核
  require_manual_approval: true    # 新规则必须人工批准后才写入 S

  # 未审核的规则暂存目录
  pending_dir: "./pending_review"

# ========== Benchmark ==========
benchmark:
  name: "ChestAgentBench"
  random_seed: 42
  evaluate_every: 10

# ========== Persistence ==========
persistence:
  save_dir: "./checkpoints"
  save_every: 50
  resume: true
